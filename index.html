<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.10/dist/dexie.min.js"></script>
    <script>
        // Configuración de Tailwind para forzar el modo oscuro por defecto
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        panel: '#111827', // slate-900
                        brand: '#4f46e5', // indigo-600
                    }
                }
            }
        }
    </script>
    <style>
        /* Deshabilitar scroll elástico vertical molesto en apps móviles */
        body {
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }
        /* Ocultar flechas nativas en inputs numéricos para control estético total */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-full flex flex-col antialiased selection:bg-indigo-500/30">

    <div class="w-full max-w-md mx-auto flex flex-col flex-1 bg-slate-950 relative min-h-screen pb-20 shadow-2xl border-x border-slate-900/50">
        
        <section id="screen-upload" class="hidden flex-1 flex flex-col justify-center px-6 py-8 animate-fadeIn">
            <div class="bg-slate-900 border border-slate-800/80 rounded-2xl p-6 text-center shadow-xl">
                <div class="w-14 h-14 bg-indigo-600/10 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-5 border border-indigo-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-100 mb-2">Inicializar Ciclo</h1>
                <p class="text-slate-400 text-sm mb-6 leading-relaxed">
                    Subí tu archivo de planificación en formato <code class="bg-slate-800 px-1.5 py-0.5 rounded text-indigo-300 font-mono text-xs">.csv</code> para cargar la base teórica del entrenamiento.
                </p>
                
                <label class="block w-full bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-semibold py-3 px-4 rounded-xl cursor-pointer transition-all border border-indigo-500 shadow-lg shadow-indigo-600/20 text-center">
                    <span>Seleccionar Archivo</span>
                    <input type="file" id="csv-input" accept=".csv" class="hidden" />
                </label>
                
                <div id="upload-error" class="mt-4 p-3 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-xs text-left hidden flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 shrink-0 mt-0.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                    </svg>
                    <span id="error-text"></span>
                </div>
            </div>
        </section>

        <section id="screen-home" class="hidden flex-1 flex flex-col p-5 animate-fadeIn">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Gym Tracker</h1>
                    <p class="text-xs text-slate-500 font-medium">Ciclo Activo de Entrenamiento</p>
                </div>
                <button id="btn-danger-reset" class="text-xs font-semibold text-red-400/80 bg-red-500/5 hover:bg-red-500/10 border border-red-500/10 hover:border-red-500/20 px-2.5 py-1.5 rounded-xl transition-all">
                    Resetear Plan
                </button>
            </header>

            <div class="mb-6">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2 px-1">Semana Activa</label>
                <div id="week-tabs" class="grid grid-cols-6 bg-slate-900 border border-slate-800 p-1 rounded-xl shadow-inner">
                    </div>
            </div>

            <div class="flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Sesiones Planificadas</h2>
                    <span id="workout-count" class="text-xs text-slate-500 font-mono bg-slate-900 px-2 py-0.5 rounded-full border border-slate-800">0</span>
                </div>
                <div id="workouts-container" class="space-y-3 flex-1">
                    </div>
            </div>
        </section>

        <nav id="bottom-nav" class="hidden absolute bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-md border-t border-slate-800/80 py-2.5 shadow-xl z-50 px-6">
            <div class="flex justify-around items-center">
                <button class="flex flex-col items-center gap-1 text-indigo-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 1-1.06 1.06l-.22-.22v7.38a.75.75 0 0 1-.75.75h-4.5a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 0-.75-.75h-1.5a.75.75 0 0 0-.75.75v4.5a.75.75 0 0 1-.75.75h-4.5a.75.75 0 0 1-.75-.75v-7.38l-.22.22a.75.75 0 1 1-1.06-1.06l8.69-8.69Z" />
                    </svg>
                    <span class="text-[10px] font-bold uppercase tracking-wide">Entrenos</span>
                </button>
                <button class="flex flex-col items-center gap-1 text-slate-600 cursor-not-allowed opacity-40">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path fill-rule="evenodd" d="M10.5 3.75a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5ZM2.25 10.5a8.25 8.25 0 1 1 14.59 5.28l4.69 4.69a.75.75 0 1 1-1.06 1.06l-4.69-4.69A8.25 8.25 0 0 1 2.25 10.5Z" clip-rule="evenodd" />
                    </svg>
                    <span class="text-[10px] font-bold uppercase tracking-wide">Historial</span>
                </button>
                <button class="flex flex-col items-center gap-1 text-slate-600 cursor-not-allowed opacity-40">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path fill-rule="evenodd" d="M11.078 2.25c-.424 0-.751.344-.751.768v.114c0 .842-.48 1.608-1.248 1.968a3.742 3.742 0 0 1-1.166.356c-.787.117-1.554-.251-2.002-.89l-.06-.085a.75.75 0 0 0-1.163.153l-1.42 2.46a.75.75 0 0 0 .193 1.002l.076.053c.663.463.987 1.285.833 2.076A3.74 3.74 0 0 1 4.3 11.4c-.167.824-.814 1.464-1.644 1.614l-.085.015a.75.75 0 0 0-.614.739v2.886a.75.75 0 0 0 .614.739l.085.015c.83.15 1.477.79 1.644 1.615a3.74 3.74 0 0 1 .032 1.18c.154.791-.17 1.613-.833 2.076l-.076.053a.75.75 0 0 0-.193 1.002l1.42 2.46a.75.75 0 0 0 1.163.153l.06-.086c.448-.637 1.215-1.006 2.002-.89a3.741 3.741 0 0 1 1.166.356c.767.36 1.248 1.126 1.248 1.968v.114c0 .424.327.768.751.768h2.844c.424 0 .751-.344.751-.768v-.114c0-.842.48-1.608 1.248-1.968a3.742 3.742 0 0 1 1.166-.356c.788-.117 1.554.251 2.002.89l.06.085a.75.75 0 0 0 1.163-.153l1.42-2.46a.75.75 0 0 0-.193-1.002l-.076-.053c-.662-.463-.987-1.285-.832-2.076a3.741 3.741 0 0 1 .032-1.18c.167-.823.814-1.463 1.644-1.614l.085-.015a.75.75 0 0 0 .614-.739v-2.886a.75.75 0 0 0-.614-.739l-.085-.015c-.83-.15-1.477-.79-1.644-1.615a3.742 3.742 0 0 1-.032-1.18c-.155-.791.17-1.613.833-2.076l.076-.053a.75.75 0 0 0 .193-1.002l-1.42-2.46a.75.75 0 0 0-1.163-.153l-.06.086c-.448.638-1.215 1.006-2.002.89a3.743 3.743 0 0 1-1.166-.356c-.767-.36-1.248-1.126-1.248-1.968v-.114a.75.75 0 0 0-.751-.768h-2.844ZM12 15.75a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z" clip-rule="evenodd" />
                    </svg>
                    <span class="text-[10px] font-bold uppercase tracking-wide">Ajustes</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        // =====================================================================
        // 1. PERSISTENCIA DE DATOS (DEXIE.JS / INDEXEDDB)
        // =====================================================================
        const db = new Dexie('GymTrackerDB');
        
        // Inicialización exacta de almacenes según sección 2 del PRD
        db.version(1).stores({
            Planificacion_Actual: '++id, Semana, Entrenamiento, Codigo_Orden', 
            Log_Ejecucion_Global: '++id, Fecha, Ejercicio, Semana, Entrenamiento'
        });

        // Estado global reactivo local
        let activeWeek = 1;

        // Elementos DOM cacheables
        const ui = {
            screenUpload: document.getElementById('screen-upload'),
            screenHome: document.getElementById('screen-home'),
            bottomNav: document.getElementById('bottom-nav'),
            csvInput: document.getElementById('csv-input'),
            uploadError: document.getElementById('upload-error'),
            errorText: document.getElementById('error-text'),
            weekTabs: document.getElementById('week-tabs'),
            workoutsContainer: document.getElementById('workouts-container'),
            workoutCount: document.getElementById('workout-count'),
            btnReset: document.getElementById('btn-danger-reset')
        };

        // =====================================================================
        // 2. ORQUESTACIÓN DE LA APLICACIÓN
        // =====================================================================
        async function runEngine() {
            try {
                const totalRowsTeoricas = await db.Planificacion_Actual.count();
                
                if (totalRowsTeoricas === 0) {
                    // Estado inicial: Fuerza la pantalla de carga limpia
                    switchScreen('upload');
                } else {
                    // Estado activo: Recupera última configuración guardada
                    switchScreen('home');
                    buildWeekSelector();
                    await refreshWorkoutsView();
                }
            } catch (err) {
                showRuntimeError("Fallo crítico en el motor IndexedDB: " + err.message);
            }
        }

        function switchScreen(target) {
            if (target === 'upload') {
                ui.screenUpload.classList.remove('hidden');
                ui.screenHome.classList.add('hidden');
                ui.bottomNav.classList.add('hidden');
            } else {
                ui.screenUpload.classList.add('hidden');
                ui.screenHome.classList.remove('hidden');
                ui.bottomNav.classList.remove('hidden');
            }
        }

        // =====================================================================
        // 3. PARSER ANALÍTICO DE CSV (ROBUSTO Y TOLERANTE A DELIMITADORES)
        // =====================================================================
        function processCSVText(rawText) {
            const lines = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length < 2) throw new Error("El archivo no contiene suficientes filas de datos.");

            // Detección automática de delimitador (Soporta ',' o ';')
            const firstLine = lines;
            const delimiter = firstLine.includes(';') ? ';' : ',';
            
            // Sanitización exhaustiva de cabeceras
            const headers = firstLine.split(delimiter).map(h => h.trim().replace(/^["']|["']$/g, ''));
            
            const mandatoryFields = [
                'Semana', 'Entrenamiento', 'Codigo_Orden', 'Ejercicio', 
                'Serie', 'Reps_Objetivo', 'Intensidad_Objetivo', 'Tempo', 'Descanso_Segundos'
            ];

            // Validación estricta del contrato del PRD
            const complianceCheck = mandatoryFields.every(field => headers.includes(field));
            if (!complianceCheck) {
                throw new Error("Estructura CSV inválida. Asegúrate de incluir todas las columnas requeridas por el PRD.");
            }

            const bulkUploadPayload = [];

            for (let i = 1; i < lines.length; i++) {
                // Regex avanzado para manejar celdas que puedan contener el delimitador dentro de comillas
                const pattern = new RegExp(`([^${delimiter}"']+|"([^"]*)"|'([^']*)')`, 'g');
                const matches = lines[i].match(pattern) || lines[i].split(delimiter);
                
                const cleanedColumns = matches.map(col => col.trim().replace(/^["']|["']$/g, ''));
                
                if (cleanedColumns.length !== headers.length) continue; // Saltea líneas corruptas

                const entry = {};
                headers.forEach((header, index) => {
                    const value = cleanedColumns[index];
                    // Tipado explícito atómico
                    if (header === 'Semana' || header === 'Serie' || header === 'Descanso_Segundos') {
                        entry[header] = parseInt(value, 10) || 0;
                    } else {
                        entry[header] = value;
                    }
                });

                bulkUploadPayload.push(entry);
            }

            if (bulkUploadPayload.length === 0) throw new Error("No se extrajeron registros válidos del CSV.");
            return bulkUploadPayload;
        }

        // Evento Listener del Input de Archivo
        ui.csvInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(evt) {
                try {
                    ui.uploadError.classList.add('hidden');
                    const parsedData = processCSVText(evt.target.result);

                    // Operación transaccional atómica en IndexedDB
                    await db.transaction('rw', db.Planificacion_Actual, async () => {
                        await db.Planificacion_Actual.clear();
                        await db.Planificacion_Actual.bulkAdd(parsedData);
                    });

                    // Establecer automáticamente la semana inicial disponible basada en la carga
                    activeWeek = parsedData.Semana || 1;
                    
                    // Inicializar interfaz limpia
                    runEngine();
                } catch (err) {
                    showUploadError(err.message);
                } finally {
                    ui.csvInput.value = ''; // Flush del input
                }
            };
            reader.readAsText(file, 'UTF-8');
        });

        function showUploadError(msg) {
            ui.errorText.textContent = msg;
            ui.uploadError.classList.remove('hidden');
        }

        function showRuntimeError(msg) {
            alert(msg);
        }

        // =====================================================================
        // 4. RENDERS DE INTERFAZ DE USUARIO (COMPONETIZACIÓN MANUAL)
        // =====================================================================
        function buildWeekSelector() {
            ui.weekTabs.innerHTML = '';
            // Generación inmutable de 1 a 6 semanas basada en la guía estructural
            for (let w = 1; w <= 6; w++) {
                const tab = document.createElement('button');
                tab.type = 'button';
                const isActive = activeWeek === w;
                
                tab.className = `text-center py-2 text-xs font-black rounded-lg transition-all ${
                    isActive 
                        ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/10 scale-[1.02]' 
                        : 'text-slate-400 hover:text-slate-200 active:bg-slate-800/50'
                }`;
                tab.textContent = `S${w}`;
                
                tab.addEventListener('click', async () => {
                    activeWeek = w;
                    buildWeekSelector(); // Re-render de pestañas
                    await refreshWorkoutsView(); // Re-render de tarjetas
                });
                
                ui.weekTabs.appendChild(tab);
            }
        }

        async function refreshWorkoutsView() {
            ui.workoutsContainer.innerHTML = '';
            
            // Consulta indexada rápida filtrada por la semana activa
            const datasets = await db.Planificacion_Actual.where('Semana').equals(activeWeek).toArray();
            
            if (datasets.length === 0) {
                ui.workoutCount.textContent = '0';
                ui.workoutsContainer.innerHTML = `
                    <div class="flex-1 flex flex-col justify-center items-center text-center p-8 border border-dashed border-slate-800 rounded-2xl min-h-[200px]">
                        <p class="text-sm text-slate-500 font-medium">No hay entrenamientos mapeados en el CSV para la Semana ${activeWeek}.</p>
                    </div>
                `;
                return;
            }

            // Aislamiento secuencial de entrenamientos únicos preservando el orden de inserción teórico
            const uniqueSessions = [];
            datasets.forEach(row => {
                if (!uniqueSessions.includes(row.Entrenamiento)) {
                    uniqueSessions.push(row.Entrenamiento);
                }
            });

            ui.workoutCount.textContent = uniqueSessions.length;

            // Inyección limpia de layouts de tarjetas
            uniqueSessions.forEach(sessionName => {
                const matchingRows = datasets.filter(r => r.Entrenamiento === sessionName);
                // Determina el conteo de variantes únicas implicadas en la sesión
                const uniqueExercisesCount = new Set(matchingRows.map(r => r.Ejercicio)).size;

                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800/70 hover:border-slate-700/80 rounded-xl p-4 flex justify-between items-center transition-all cursor-pointer active:scale-[0.99] group shadow-sm";
                
                card.innerHTML = `
                    <div class="space-y-1">
                        <h3 class="font-bold text-base text-slate-100 group-hover:text-indigo-400 transition-colors">${sessionName}</h3>
                        <p class="text-xs text-slate-400 flex items-center gap-1.5 font-medium">
                            <span class="inline-block w-1.5 h-1.5 rounded-full bg-slate-700"></span>
                            ${uniqueExercisesCount} ejercicios en el bloque
                        </p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="px-2 py-0.5 rounded-md text-[10px] font-extrabold uppercase tracking-widest bg-amber-500/10 text-amber-400 border border-amber-500/10">
                            Pendiente
                        </span>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-slate-500 group-hover:translate-x-0.5 transition-transform">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                        </svg>
                    </div>
                `;

                // Interceptador táctil para la futura Fase 2
                card.addEventListener('click', () => {
                    alert(`Interconectividad de la Fase 2:\nInicializando interfaz interactiva para "${sessionName}" (Semana ${activeWeek}).`);
                });

                ui.workoutsContainer.appendChild(card);
            });
        }

        // =====================================================================
        // 5. PURGA EXPLICITADA DE DATOS
        // =====================================================================
        ui.btnReset.addEventListener('click', async () => {
            const doubleCheck = confirm(
                "¿Confirmás que querés remover la planificación actual?\n\n*Nota: Tu almacén histórico acumulativo (Log_Ejecucion_Global) no sufrirá modificaciones."
            );
            if (doubleCheck) {
                await db.Planificacion_Actual.clear();
                runEngine();
            }
        });

        // Arranque inicial automático de la aplicación
        runEngine();
    </script>
</body>
</html>
